{% extends "base.html" %}

{% block title %}Giriş Yap — VentureAgent{% endblock %}

{% block content %}
    <div class="auth-shell">
        <h1>Giriş Yap</h1>
        <p class="subtitle">Kaldığın yerden devam et.</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login') }}" class="form">
            <input type="hidden" name="next" value="{{ next or '' }}">

            <label for="email">E-posta</label>
            <input type="email" id="email" name="email" value="{{ email or '' }}" required>

            <label for="password">Şifre</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Giriş Yap</button>
        </form>

        <p class="auth-switch">
            Hesabın yok mu? <a href="{{ url_for('auth.register') }}">Kayıt ol</a>
        </p>
    </div>
{% endblock %}
