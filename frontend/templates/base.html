<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VentureAgent{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('main.index') }}" class="brand">VentureAgent</a>
        <div class="nav-links">
            <a href="{{ url_for('main.index') }}">Başla</a>
            <a href="{{ url_for('dashboard.dashboard_page') }}">Dashboard</a>
            <a href="{{ url_for('history.history_page') }}">Geçmiş</a>
            <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Tema değiştir" title="Tema değiştir">
                <span id="theme-toggle-icon">Dark</span>
            </button>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
